<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background: var(--pps-bone); font-family: var(--font-sans); display:flex; flex-direction:column; }
  .panel { padding:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  .light { background: var(--pps-bone); }
  .dark { background: var(--pps-navy); }
  .panel img { max-height: 60px; max-width: 80%; object-fit: contain; }
  .label { font-size:10px; text-transform:uppercase; letter-spacing:0.16em; }
  .light .label { color: var(--pps-stone); }
  .dark .label { color: rgba(255,255,255,0.6); }
</style></head>
<body>
  <div class="panel light"><img src="../assets/logo-color.png" alt="PPS logo"><div class="label">Logo · light</div></div>
  <div class="panel dark"><img src="../assets/logo-white.png" alt="PPS logo white"><div class="label">Logo · dark</div></div>
</body></html>
