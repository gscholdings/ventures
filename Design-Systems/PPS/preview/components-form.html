<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--pps-bone); font-family: var(--font-sans); }
  .form { display:flex; flex-direction:column; gap:14px; max-width:420px; }
  label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color: var(--pps-navy); margin-bottom:4px; display:block; }
  .input { width:100%; padding:12px 14px; border:1px solid var(--pps-fog); background:#fff; border-radius:4px; font-size:14px; color: var(--pps-navy); font-family: var(--font-sans); transition: border-color 150ms ease; }
  .input:focus { outline:none; border-color: var(--pps-orange); box-shadow: 0 0 0 3px rgba(241,99,52,0.15); }
  .input::placeholder { color: var(--pps-ash); }
  .row { display:flex; gap:10px; }
  .row > * { flex:1; }
  .check { display:flex; gap:8px; align-items:center; font-size:13px; color: var(--pps-graphite); }
  .check input { accent-color: var(--pps-orange); width:16px; height:16px; }
</style></head>
<body>
<div class="form">
  <div><label>Full Name</label><input class="input" placeholder="Jane Doe"></div>
  <div class="row">
    <div><label>Email</label><input class="input" placeholder="jane@company.com"></div>
    <div><label>Company</label><input class="input" placeholder="Acme Inc."></div>
  </div>
  <div><label>Tell us about the conflict</label><textarea class="input" rows="3" placeholder="A brief description…"></textarea></div>
  <label class="check"><input type="checkbox" checked> Subscribe to monthly insights</label>
</div>
</body></html>
