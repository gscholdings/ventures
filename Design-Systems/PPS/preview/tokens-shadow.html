<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:32px; background: var(--pps-bone); font-family: var(--font-sans); }
  .row { display:flex; gap:24px; align-items:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; flex:1; }
  .card { width:90px; height:60px; background:#fff; border-radius:8px; }
  .xs { box-shadow: 0 1px 2px rgba(15,46,60,0.06); }
  .sm { box-shadow: 0 2px 6px rgba(15,46,60,0.08); }
  .md { box-shadow: 0 8px 20px rgba(15,46,60,0.10); }
  .lg { box-shadow: 0 18px 40px rgba(15,46,60,0.14); }
  .img{ box-shadow: 0 30px 60px -20px rgba(15,46,60,0.35); }
  .key{ font-family: var(--font-mono); font-size:11px; color: var(--pps-navy); font-weight:600; }
  .role{ font-size:10px; color: var(--pps-stone); text-transform:uppercase; letter-spacing:0.1em; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="card xs"></div><div class="key">xs</div><div class="role">Buttons</div></div>
  <div class="item"><div class="card sm"></div><div class="key">sm</div><div class="role">Cards rest</div></div>
  <div class="item"><div class="card md"></div><div class="key">md</div><div class="role">Cards hover</div></div>
  <div class="item"><div class="card lg"></div><div class="key">lg</div><div class="role">Popovers</div></div>
  <div class="item"><div class="card img"></div><div class="key">image</div><div class="role">Hero photos</div></div>
</div>
</body></html>
