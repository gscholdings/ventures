<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--pps-bone); font-family: var(--font-sans); }
  .row { display:flex; align-items:flex-end; gap:10px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background: var(--pps-orange); border-radius: 2px; }
  .key { font-family: var(--font-mono); font-size:10px; color: var(--pps-navy); font-weight:600; }
  .px  { font-family: var(--font-mono); font-size:10px; color: var(--pps-stone); }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="width:18px;height:4px"></div><div class="key">1</div><div class="px">4</div></div>
  <div class="item"><div class="bar" style="width:18px;height:8px"></div><div class="key">2</div><div class="px">8</div></div>
  <div class="item"><div class="bar" style="width:18px;height:12px"></div><div class="key">3</div><div class="px">12</div></div>
  <div class="item"><div class="bar" style="width:18px;height:16px"></div><div class="key">4</div><div class="px">16</div></div>
  <div class="item"><div class="bar" style="width:18px;height:24px"></div><div class="key">6</div><div class="px">24</div></div>
  <div class="item"><div class="bar" style="width:18px;height:32px"></div><div class="key">8</div><div class="px">32</div></div>
  <div class="item"><div class="bar" style="width:18px;height:48px"></div><div class="key">12</div><div class="px">48</div></div>
  <div class="item"><div class="bar" style="width:18px;height:64px"></div><div class="key">16</div><div class="px">64</div></div>
  <div class="item"><div class="bar" style="width:18px;height:80px"></div><div class="key">20</div><div class="px">80</div></div>
  <div class="item"><div class="bar" style="width:18px;height:96px"></div><div class="key">24</div><div class="px">96</div></div>
</div>
<div style="margin-top:18px; font-size:11px; color:var(--pps-stone); font-family:var(--font-mono)">4px base · scale 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 / 80 / 96 / 128</div>
</body></html>
