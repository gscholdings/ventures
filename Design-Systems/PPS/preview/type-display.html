<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--pps-bone); }
  .stack { display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; gap:16px; align-items:baseline; padding-bottom:14px; border-bottom:1px solid var(--pps-fog); }
  .row:last-child { border-bottom:none; padding-bottom:0; }
  .label { font-family: var(--font-sans); font-size:11px; color: var(--pps-stone); text-transform:uppercase; letter-spacing:0.12em; min-width:90px; flex-shrink:0; }
  .specimen { font-family: var(--font-display); color: var(--pps-navy); line-height:1.1; letter-spacing:-0.01em; font-weight:700; }
  .meta { font-family: var(--font-mono); font-size:10px; color: var(--pps-stone); margin-left:auto; flex-shrink:0; }
</style></head>
<body>
<div class="stack">
  <div class="row"><span class="label">Hero</span><span class="specimen" style="font-size:48px">Bring peace</span><span class="meta">48px / 700</span></div>
  <div class="row"><span class="label">Display</span><span class="specimen" style="font-size:36px">Meet the team</span><span class="meta">36px / 700</span></div>
  <div class="row"><span class="label">H1</span><span class="specimen" style="font-size:30px">Got conflict?</span><span class="meta">30px / 700</span></div>
  <div class="row"><span class="label">H2</span><span class="specimen" style="font-size:24px">Workplace mediation</span><span class="meta">24px / 700</span></div>
  <div class="row"><span class="label">Italic</span><span class="specimen" style="font-size:30px;font-style:italic;color:var(--pps-orange)">peace</span><span class="meta">italic accent</span></div>
</div>
</body></html>
