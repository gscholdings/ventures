<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Pollack Peacebuilding — Website Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; background: var(--pps-bone); }
  #root { min-width: 1280px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="SocialIcons.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="LogoBar.jsx"></script>
<script type="text/babel" src="ServiceCards.jsx"></script>
<script type="text/babel" src="TeamGrid.jsx"></script>
<script type="text/babel" src="ArticleGrid.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  function App() {
    React.useEffect(() => {
      // re-render lucide icons whenever the tree updates
      const id = setInterval(() => window.lucide && window.lucide.createIcons(), 300);
      return () => clearInterval(id);
    }, []);
    return (
      <div data-screen-label="01 Marketing Website">
        <Header />
        <Hero />
        <LogoBar />
        <ServiceCards />
        <TeamGrid />
        <ArticleGrid />
        <Footer />
        <ContactRail />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
