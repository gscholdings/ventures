<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--pps-bone); font-family: var(--font-sans); display:flex; align-items:center; gap:24px; }
  .mark { width:130px; height:130px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:#fff; border-radius:8px; box-shadow: 0 2px 6px rgba(15,46,60,0.08); }
  .mark img { width:96px; height:96px; object-fit: contain; }
  .meta { flex:1; }
  .h { font-family: var(--font-display); font-weight:700; font-size:20px; color: var(--pps-navy); margin:0 0 6px; }
  .p { font-size:13px; color: var(--pps-stone); line-height:1.5; margin:0; }
</style></head>
<body>
  <div class="mark"><img src="../assets/icon-mark.png" alt="PPS mark"></div>
  <div class="meta">
    <div class="h">Six interlocked rings</div>
    <p class="p">Three navy, three orange, rotationally symmetric. Use as favicon, app icon, and standalone mark when the wordmark is too wide.</p>
  </div>
</body></html>
