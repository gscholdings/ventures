<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px; background: var(--pps-bone); font-family: var(--font-sans); }
  .block { display:flex; flex-direction:column; gap:8px; padding-bottom:18px; border-bottom: 1px solid var(--pps-fog); margin-bottom:18px; }
  .block:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .eyebrow { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.18em; color: var(--pps-orange); }
  .head { font-family: var(--font-display); font-size:30px; font-weight:700; color: var(--pps-navy); line-height:1.15; letter-spacing:-0.01em; }
  .body { font-size:15px; color: var(--pps-stone); line-height:1.6; max-width:48ch; }
  .accent { color: var(--pps-orange); font-style: italic; }
</style></head>
<body>
  <div class="block">
    <div class="eyebrow">Founder &amp; Peace Director</div>
    <div class="head">Jeremy Pollack, Ph.D.</div>
    <div class="body">As the founder of PPS, Jeremy oversees and consults with his team on all peace processes.</div>
  </div>
  <div class="block">
    <div class="eyebrow">Organizational Culture</div>
    <div class="head">Got conflict? We can bring <span class="accent">peace</span> to your team.</div>
  </div>
</body></html>
