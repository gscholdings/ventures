<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--pps-bone); font-family: var(--font-sans); }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:16px; align-items:baseline; padding-bottom:12px; border-bottom:1px solid var(--pps-fog); }
  .row:last-child { border-bottom:none; padding-bottom:0; }
  .label { font-size:11px; color: var(--pps-stone); text-transform:uppercase; letter-spacing:0.12em; min-width:90px; flex-shrink:0; }
  .specimen { color: var(--pps-graphite); line-height:1.5; }
  .meta { font-family: var(--font-mono); font-size:10px; color: var(--pps-stone); margin-left:auto; flex-shrink:0; }
</style></head>
<body>
<div class="stack">
  <div class="row"><span class="label">Lead</span><span class="specimen" style="font-size:18px">Diverse conflict experiences inform our solutions.</span><span class="meta">18px / 400</span></div>
  <div class="row"><span class="label">Body</span><span class="specimen" style="font-size:16px">Read the latest research, tips, and advice to improve your culture.</span><span class="meta">16px / 400</span></div>
  <div class="row"><span class="label">Small</span><span class="specimen" style="font-size:15px;color:var(--pps-stone)">Our nationwide team of coaches and trainers.</span><span class="meta">15px / 400</span></div>
  <div class="row"><span class="label">Caption</span><span class="specimen" style="font-size:13px;color:var(--pps-stone)">Last updated May 2026</span><span class="meta">13px / 400</span></div>
  <div class="row"><span class="label">Strong</span><span class="specimen" style="font-size:16px;font-weight:600;color:var(--pps-navy)">We're the experts.</span><span class="meta">16px / 600</span></div>
</div>
</body></html>
