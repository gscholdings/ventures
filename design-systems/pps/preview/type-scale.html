<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--pps-bone); font-family: var(--font-sans); }
  .table { display:grid; grid-template-columns: 70px 80px 1fr 100px; gap: 8px 16px; align-items:baseline; }
  .key { font-family: var(--font-mono); font-size:11px; color: var(--pps-navy); font-weight:600; }
  .px  { font-family: var(--font-mono); font-size:11px; color: var(--pps-stone); }
  .demo{ font-family: var(--font-display); color: var(--pps-navy); font-weight:700; line-height:1; letter-spacing:-0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .role{ font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color: var(--pps-stone); }
  .row { display:contents; }
  .row > * { padding-bottom:6px; border-bottom:1px solid var(--pps-fog); }
</style></head>
<body>
<div class="table">
  <div class="row"><div class="key">--fs-hero</div><div class="px">88px</div><div class="demo" style="font-size:48px">Bring peace</div><div class="role">Hero</div></div>
  <div class="row"><div class="key">--fs-display</div><div class="px">60px</div><div class="demo" style="font-size:38px">Meet the team</div><div class="role">Display</div></div>
  <div class="row"><div class="key">--fs-h1</div><div class="px">44px</div><div class="demo" style="font-size:30px">Got conflict?</div><div class="role">H1</div></div>
  <div class="row"><div class="key">--fs-h2</div><div class="px">30px</div><div class="demo" style="font-size:24px">Workplace mediation</div><div class="role">H2</div></div>
  <div class="row"><div class="key">--fs-h3</div><div class="px">24px</div><div class="demo" style="font-size:20px">Section heading</div><div class="role">H3</div></div>
  <div class="row"><div class="key">--fs-body</div><div class="px">16px</div><div class="demo" style="font-family:var(--font-sans);font-weight:400;font-size:16px;color:var(--pps-graphite)">Body — humanist sans, generous leading.</div><div class="role">Body</div></div>
</div>
</body></html>
